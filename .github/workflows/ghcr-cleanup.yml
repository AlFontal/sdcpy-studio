name: GHCR Cleanup

on:
  workflow_dispatch:
    inputs:
      min_versions_to_keep:
        description: "Number of package versions to keep"
        required: true
        default: "5"
      delete_only_untagged_versions:
        description: "Delete only untagged container versions"
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: clean ghcr package versions
    runs-on: ubuntu-latest

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: sdcpy-studio
          package-type: container
          min-versions-to-keep: ${{ github.event.inputs.min_versions_to_keep }}
          delete-only-untagged-versions: ${{ github.event.inputs.delete_only_untagged_versions }}
