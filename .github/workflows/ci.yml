name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api_tests:
    name: api tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      UV_NO_SOURCES: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync --extra dev --no-sources --upgrade-package sdcpy-map

      - name: Run API tests
        run: uv run pytest -q tests/test_api.py
