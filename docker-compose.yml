services:
  sdcpy-studio:
    image: ghcr.io/alfontal/sdcpy-studio:latest
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "8050:8000"
    environment:
      SDCPY_STUDIO_MAX_WORKERS: "2"
      SDCPY_STUDIO_MAP_PREWARM_MODE: "${SDCPY_STUDIO_MAP_PREWARM_MODE:-auto}"
      SDCPY_STUDIO_SDCPY_MAP_DATA_DIR: "/root/.cache/sdcpy-studio/sdcpy-map"
    volumes:
      - sdcpy_map_cache:/root/.cache/sdcpy-studio/sdcpy-map

  cache-map:
    image: ghcr.io/alfontal/sdcpy-studio:latest
    profiles:
      - tools
    command: ["python", "/app/scripts/prewarm-map-cache.py"]
    environment:
      SDCPY_STUDIO_MAP_PREWARM_MODE: "off"
      SDCPY_STUDIO_SDCPY_MAP_DATA_DIR: "/root/.cache/sdcpy-studio/sdcpy-map"
    volumes:
      - sdcpy_map_cache:/root/.cache/sdcpy-studio/sdcpy-map

  watchtower:
    image: containrrr/watchtower:1.7.1
    profiles:
      - ops
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "300"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dozzle:
    image: amir20/dozzle:v10.1.1
    profiles:
      - ops
    ports:
      - "8051:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  sdcpy_map_cache:
